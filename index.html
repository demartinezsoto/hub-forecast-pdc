<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hub de Pronóstico · PDC</title>
<link rel="stylesheet" href="css/pdc.css">
<script src="js/estado.js"></script>
<script src="js/auth.js"></script>
<style>
html, body { height: 100%; overflow: hidden; display: flex; flex-direction: column; }

/* ── Layout principal ── */
.hub-layout { display: flex; flex-direction: column; height: calc(100vh - 48px); overflow: hidden; }
.hub-content { flex: 1; overflow-y: auto; }
.hub-page { max-width: 1100px; margin: 0 auto; padding: 20px 18px 60px; display: flex; flex-direction: column; gap: 16px; }

/* ── Bienvenida ── */
.welcome-card {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, #1D4A6B 100%);
  border-radius: var(--r);
  padding: 20px 22px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.welcome-text { flex: 1; min-width: 200px; }
.welcome-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.welcome-sub { font-size: 12px; opacity: .65; }
.welcome-ciclo {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--r-sm);
  padding: 8px 14px;
  text-align: center;
}
.welcome-ciclo-label { font-size: 10px; opacity: .6; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
.welcome-ciclo-val { font-size: 14px; font-weight: 700; }
.welcome-ciclo-sub { font-size: 11px; opacity: .65; margin-top: 1px; }

/* ── Tarea pendiente ── */
.tarea-card {
  border-radius: var(--r);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.tarea-urgente { background: var(--rlt); border: 1px solid #F4BABA; }
.tarea-normal  { background: var(--blt); border: 1px solid #BDD0F5; }
.tarea-ok      { background: var(--glt); border: 1px solid #B2D9C2; }
.tarea-icon { font-size: 24px; flex-shrink: 0; }
.tarea-text { flex: 1; font-size: 13px; font-weight: 600; color: var(--navy); }
.tarea-sub  { font-size: 11px; color: var(--mid); font-weight: 400; margin-top: 2px; }

/* ── Semanas del ciclo ── */
.semanas-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media(max-width:640px) { .semanas-grid { grid-template-columns: 1fr 1fr; } }
.semana-card {
  background: var(--w);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 12px 14px;
  cursor: pointer;
  transition: all .15s;
}
.semana-card:hover { border-color: var(--blue); box-shadow: var(--sh); }
.semana-card.activa { border-color: var(--teal); background: var(--tlt); }
.semana-card.pasada { opacity: .55; }
.semana-num { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--mid); margin-bottom: 3px; }
.semana-label { font-size: 12px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.semana-fecha { font-size: 11px; color: var(--mid); }
.semana-estado { margin-top: 6px; }

/* ── Historial de ciclos ── */
.ciclo-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--bdr); flex-wrap: wrap; }
.ciclo-row:last-child { border-bottom: none; }
.ciclo-mes { font-size: 12px; font-weight: 600; color: var(--navy); min-width: 80px; }
.ciclo-fva-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 140px; }
.ciclo-fva-val { font-size: 13px; font-weight: 700; min-width: 52px; text-align: right; }
.ciclo-fva-bar { flex: 1; height: 6px; background: #EEF1F7; border-radius: 3px; overflow: hidden; }
.ciclo-fva-fill { height: 100%; border-radius: 3px; }

/* ── Semáforo Planner ── */
.semaforo-table th, .semaforo-table td { font-size: 12px; }
.sem-cell { display: flex; align-items: center; justify-content: center; gap: 4px; }
.progreso-bar { width: 80px; height: 6px; background: #EEF1F7; border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; }
.progreso-fill { height: 100%; background: var(--teal); border-radius: 3px; }

/* ── Calendario expandible ── */
.cal-semana { margin-bottom: 12px; }
.cal-semana-head {
  padding: 8px 14px;
  background: var(--navy);
  color: #fff;
  border-radius: var(--r-sm) var(--r-sm) 0 0;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}
.cal-semana-head:hover { background: var(--navy2); }
.cal-semana-label { font-size: 12px; font-weight: 600; flex: 1; }
.cal-semana-fechas { font-size: 11px; opacity: .6; }
.cal-semana-tog { font-size: 10px; transition: transform .2s; }
.cal-semana-tog.open { transform: rotate(90deg); }
.cal-dias { display: none; border: 1px solid var(--bdr); border-top: none; border-radius: 0 0 var(--r-sm) var(--r-sm); background: var(--w); }
.cal-dias.open { display: block; }
.cal-dia { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border-bottom: 1px solid #F1F5F9; }
.cal-dia:last-child { border-bottom: none; }
.cal-dia-num { font-size: 18px; font-weight: 700; color: var(--navy); width: 30px; text-align: center; line-height: 1.2; flex-shrink: 0; }
.cal-dia-dow { font-size: 9px; color: var(--mid); text-align: center; margin-top: 1px; }
.cal-dia-eventos { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.evento {
  font-size: 11px;
  padding: 4px 9px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.evento-azul   { background: var(--blt);  color: var(--blue); }
.evento-teal   { background: var(--tlt);  color: var(--teal); }
.evento-amber  { background: var(--alt);  color: var(--amber); }
.evento-navy   { background: #E8EDF5;      color: var(--navy); }
.evento-red    { background: var(--rlt);  color: var(--red); }

/* ── FVA comparativo (Planner) ── */
.fva-comp-table th { white-space: nowrap; }
.fva-chip {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  display: inline-block;
  min-width: 54px;
  text-align: center;
}
.fva-pos-chip { background: var(--glt); color: var(--green); }
.fva-neg-chip { background: var(--rlt); color: var(--red); }
.fva-neu-chip { background: #EEF1F7;    color: var(--mid); }

/* ── Agenda Outlook ── */
.agenda-step { display: flex; gap: 14px; margin-bottom: 20px; }
.agenda-step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--navy); color: #fff;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.agenda-step-body { flex: 1; }
.agenda-step-title { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
.participante-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: #EEF1F7; border: 1px solid var(--bdr);
  border-radius: 20px; padding: 4px 10px;
  font-size: 11px; cursor: pointer; margin: 2px;
  transition: all .15s;
}
.participante-chip.sel { background: var(--blt); border-color: var(--blue); color: var(--blue); }
.invite-box {
  background: #F8FAFC;
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 14px 16px;
  font-size: 12px;
  font-family: var(--M);
  white-space: pre-wrap;
  line-height: 1.6;
  color: var(--sl);
}

/* ── Módulo acceso rápido ── */
.modulos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
@media(max-width:640px) { .modulos-grid { grid-template-columns: 1fr; } }
.modulo-card {
  background: var(--w);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-decoration: none;
}
.modulo-card:hover { border-color: var(--blue); box-shadow: var(--sh); transform: translateY(-1px); }
.modulo-icon { font-size: 26px; }
.modulo-title { font-size: 13px; font-weight: 700; color: var(--navy); }
.modulo-desc  { font-size: 11px; color: var(--mid); line-height: 1.4; }
.modulo-badge { align-self: flex-start; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="pdc-top">
  <span class="pdc-top-logo">PDC</span>
  <span class="pdc-top-sep">|</span>
  <span class="pdc-top-title">Hub de Pronóstico</span>
  <span class="pdc-top-ctx" id="top-ctx">Cargando...</span>
  <div id="top-user"></div>
</div>

<!-- TABS (se llenan según el rol) -->
<div class="pdc-tabs" id="main-tabs"></div>

<!-- CONTENIDO PRINCIPAL -->
<div class="hub-layout">
  <div class="hub-content" id="hub-content">
    <!-- Se llena dinámicamente según rol -->
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   Hub principal — lógica de vistas por rol
   ═══════════════════════════════════════════════════ */

let usuarioActivo = null;
let tabActual = null;

/* ── Inicializar ────────────────────────────────── */
Auth.init(function(usuario) {
  usuarioActivo = usuario;
  iniciarHub();
});

function iniciarHub() {
  // Topbar
  document.getElementById('top-ctx').textContent =
    PDC.CICLO_ACTUAL.nombre + ' · ' + (usuarioActivo.rol === 'GM'
      ? (PDC.MARCAS.find(m => m.id === usuarioActivo.marcaId)?.nombre || '')
      : 'Planner de Demanda');

  Auth.renderBtnCambiar(document.getElementById('top-user'));

  // Construir vistas según rol
  if (usuarioActivo.rol === 'GM') {
    construirVistasGM();
  } else {
    construirVistasPLANNER();
  }
}

/* ════════════════════════════════════════════════════
   VISTA GERENTE DE MARCA
   ════════════════════════════════════════════════════ */
function construirVistasGM() {
  const tabs = [
    { id: 'inicio',     label: 'Inicio',     icon: '🏠' },
    { id: 'calendario', label: 'Calendario', icon: '📅' },
    { id: 'fva',        label: 'Mi FVA',     icon: '📊' },
  ];
  renderTabs(tabs, 'inicio');

  renderTabGM('inicio');
}

function renderTabGM(tabId) {
  tabActual = tabId;
  const contenido = document.getElementById('hub-content');
  const marcaId = usuarioActivo.marcaId;
  const marca = PDC.MARCAS.find(m => m.id === marcaId);

  if (tabId === 'inicio') {
    contenido.innerHTML = `<div class="hub-page" id="page-gm-inicio"></div>`;
    renderInicioGM(document.getElementById('page-gm-inicio'), marcaId, marca);
  } else if (tabId === 'calendario') {
    contenido.innerHTML = `<div class="hub-page" id="page-gm-cal"></div>`;
    renderCalendarioGM(document.getElementById('page-gm-cal'));
  } else if (tabId === 'fva') {
    contenido.innerHTML = `<div class="hub-page" id="page-gm-fva"></div>`;
    renderFVAGM(document.getElementById('page-gm-fva'), marcaId, marca);
  }
}

function renderInicioGM(el, marcaId, marca) {
  const estado = PDC.getEstadoGM(marcaId);
  const tarea  = PDC.tareaPendiente(marcaId);
  const sesionGuardada = PDC.leerSesionBB(marcaId);
  const diasCierre = PDC.diasParaCierre();
  const semanaActual = PDC.getSemanaActual();

  // Bienvenida
  const bienvenida = document.createElement('div');
  bienvenida.className = 'welcome-card';
  bienvenida.innerHTML = `
    <div class="welcome-text">
      <div class="welcome-title">Bienvenido, ${usuarioActivo.nombre.split(' ')[0]} 👋</div>
      <div class="welcome-sub">${marca?.nombre || ''} · ${PDC.CICLO_ACTUAL.nombre}</div>
    </div>
    <div class="welcome-ciclo">
      <div class="welcome-ciclo-label">Semana activa</div>
      <div class="welcome-ciclo-val">${semanaActual === 'pre-ciclo' ? 'Pre-ciclo' : semanaActual === 'post-ciclo' ? 'Cerrado' : semanaActual}</div>
      <div class="welcome-ciclo-sub">${diasCierre > 0 ? diasCierre + ' días al cierre' : 'Ciclo cerrado'}</div>
    </div>
  `;
  el.appendChild(bienvenida);

  // Tarea pendiente
  if (tarea) {
    const tareaEl = document.createElement('div');
    tareaEl.className = `tarea-card ${tarea.urgente ? 'tarea-urgente' : 'tarea-normal'}`;
    tareaEl.innerHTML = `
      <div class="tarea-icon">${tarea.urgente ? '⚠️' : '📋'}</div>
      <div style="flex:1">
        <div class="tarea-text">${tarea.texto}</div>
        <div class="tarea-sub">${tarea.tipo === 'bb' ? 'Fecha límite: ' + PDC.formatFecha(PDC.CICLO_ACTUAL.fechaLimiteBB) : 'Revisar en tab Calendario'}</div>
      </div>
      ${tarea.tipo === 'bb' ? `
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <a href="bb/index.html" class="btn btn-primary" style="text-decoration:none">
            ${sesionGuardada ? '🔄 Continuar Building Blocks' : '➕ Abrir Building Blocks'}
          </a>
          ${sesionGuardada ? `<span style="font-size:10px;color:var(--teal)">✓ Sesión guardada — ${PDC.formatFecha(sesionGuardada.guardadoEn?.slice(0,10))}</span>` : ''}
        </div>
      ` : ''}
    `;
    el.appendChild(tareaEl);
  } else {
    const okEl = document.createElement('div');
    okEl.className = 'tarea-card tarea-ok';
    okEl.innerHTML = `
      <div class="tarea-icon">✅</div>
      <div class="flex-1">
        <div class="tarea-text">Todo al día — no hay tareas pendientes</div>
        <div class="tarea-sub">Puedes revisar el calendario o tu historial de FVA</div>
      </div>
    `;
    el.appendChild(okEl);
  }

  // Estado del ciclo actual
  const estadoCard = document.createElement('div');
  estadoCard.className = 'card';
  estadoCard.innerHTML = `
    <div class="card-head">
      <span class="card-title">📋 Mi estado en este ciclo</span>
    </div>
    <div class="card-body tight">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="padding:10px;background:${estado.bbEntregado ? '#E8F5EE' : '#FDF3E3'};border-radius:var(--r-sm);border:1px solid ${estado.bbEntregado ? '#B2D9C2' : '#F4D4A0'}">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mid);margin-bottom:4px">Building Blocks</div>
          <div style="font-size:13px;font-weight:700;color:${estado.bbEntregado ? 'var(--green)' : 'var(--amber)'}">
            ${estado.bbEntregado ? '✅ Entregado' : '⏳ Pendiente'}
          </div>
          ${estado.bbFecha ? `<div style="font-size:10px;color:var(--mid);margin-top:2px">${PDC.formatFecha(estado.bbFecha)}</div>` : ''}
        </div>
        <div style="padding:10px;background:${estado.forecastAprobado ? '#E8F5EE' : '#F0F2F7'};border-radius:var(--r-sm);border:1px solid ${estado.forecastAprobado ? '#B2D9C2' : 'var(--bdr)'}">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mid);margin-bottom:4px">Forecast V2</div>
          <div style="font-size:13px;font-weight:700;color:${estado.forecastAprobado ? 'var(--green)' : 'var(--mid)'}">
            ${estado.forecastAprobado ? '✅ Aprobado' : '— En espera'}
          </div>
        </div>
      </div>
    </div>
  `;
  el.appendChild(estadoCard);

  // Acceso a módulos
  const modCard = document.createElement('div');
  modCard.className = 'card';
  modCard.innerHTML = `
    <div class="card-head"><span class="card-title">🚀 Módulos</span></div>
    <div class="card-body">
      <div class="modulos-grid">
        <a href="bb/index.html" class="modulo-card">
          <div class="modulo-icon">🏗️</div>
          <div class="modulo-title">Building Blocks</div>
          <div class="modulo-desc">Captura tus ajustes al forecast estadístico con apoyo de IA</div>
          ${sesionGuardada ? '<span class="badge badge-teal modulo-badge" style="background:var(--tlt);color:var(--teal)">Sesión guardada</span>' : '<span class="badge badge-mid modulo-badge">Sin sesión</span>'}
        </a>
        <a href="gdm/index.html" class="modulo-card">
          <div class="modulo-icon">📈</div>
          <div class="modulo-title">Dinámicas Comerciales</div>
          <div class="modulo-desc">Registra iniciativas y mide su efectividad con sell-out y sell-in</div>
          <span class="badge badge-orange modulo-badge">Nuevo</span>
        </a>
        <div class="modulo-card" onclick="irATab('fva')" style="cursor:pointer">
          <div class="modulo-icon">📊</div>
          <div class="modulo-title">Mi FVA</div>
          <div class="modulo-desc">Historial de tu Forecast Value Added en los últimos ciclos</div>
        </div>
      </div>
    </div>
  `;
  el.appendChild(modCard);

  // Historial de ciclos
  const fvaData = PDC.getFVA(marcaId);
  const histCard = document.createElement('div');
  histCard.className = 'card';
  let histRows = fvaData.map(c => {
    if (c.valor === null) {
      return `<div class="ciclo-row">
        <div class="ciclo-mes">${c.ciclo}</div>
        <div style="font-size:11px;color:var(--mid)">Ciclo en curso</div>
        <span class="badge badge-blue">Activo</span>
      </div>`;
    }
    const pos = c.valor >= 0;
    const ancho = Math.min(Math.abs(c.valor) * 3, 100);
    return `<div class="ciclo-row">
      <div class="ciclo-mes">${c.ciclo}</div>
      <div class="ciclo-fva-wrap">
        <div class="ciclo-fva-bar"><div class="ciclo-fva-fill" style="width:${ancho}%;background:${pos ? 'var(--green)' : 'var(--red)'}"></div></div>
        <div class="ciclo-fva-val" style="color:${pos ? 'var(--green)' : 'var(--red)'}">${pos ? '+' : ''}${c.valor.toFixed(1)}%</div>
      </div>
    </div>`;
  }).join('');
  histCard.innerHTML = `
    <div class="card-head"><span class="card-title">📈 Historial FVA — últimos ciclos</span></div>
    <div class="card-body tight">${histRows}</div>
  `;
  el.appendChild(histCard);
}

function renderCalendarioGM(el) {
  el.innerHTML = `<div class="card"><div class="card-head"><span class="card-title">📅 Calendario del ciclo — ${PDC.CICLO_ACTUAL.nombre}</span></div><div class="card-body tight" id="cal-content"></div></div>`;

  const semanas = PDC.CICLO_ACTUAL.semanas;
  const semActual = PDC.getSemanaActual();
  const calEl = document.getElementById('cal-content');
  const marcaId = usuarioActivo.marcaId;

  // Eventos del ciclo por día
  const eventos = {
    '2026-07-07': [{ label: 'FCS Pro corre estadístico V1',            clase: 'evento-navy' }],
    '2026-07-09': [{ label: 'Planner valida baseline estadístico',      clase: 'evento-azul' }],
    '2026-07-11': [{ label: 'Gerentes notificados — BBs habilitados',   clase: 'evento-teal' }],
    '2026-07-14': [{ label: '⚠️ Fecha límite entrega de BBs (48h)',     clase: 'evento-red'  }],
    '2026-07-15': [{ label: 'Sesión colaborativa — Magia Blanca',       clase: 'evento-teal' }],
    '2026-07-16': [{ label: 'Sesión colaborativa — Australian',         clase: 'evento-teal' }],
    '2026-07-17': [{ label: 'Sesión colaborativa — Del Carmen',         clase: 'evento-teal' },
                   { label: 'Sesión colaborativa — Ayudín (PM)',        clase: 'evento-teal' }],
    '2026-07-18': [{ label: 'Sesión colaborativa — DKasa',              clase: 'evento-teal' },
                   { label: 'Distribuidores — tarde',                   clase: 'evento-amber'}],
    '2026-07-21': [{ label: 'Sesión distribuidores restantes',          clase: 'evento-amber'}],
    '2026-07-22': [{ label: 'Consolidación forecast V2',                clase: 'evento-azul' }],
    '2026-07-23': [{ label: '🔒 Cierre máximo S4 (regla de oro)',       clase: 'evento-red'  }],
    '2026-07-24': [{ label: 'Pre S&OP — revisión ejecutiva',            clase: 'evento-navy' }],
    '2026-07-25': [{ label: 'S&OP Ejecutivo · Entrega a Supply',        clase: 'evento-navy' }],
  };

  const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  Object.entries(semanas).forEach(([sk, sv]) => {
    const div = document.createElement('div');
    div.className = 'cal-semana';
    const esActiva = sk === semActual;

    let diasHtml = '';
    let fecha = new Date(sv.inicio + 'T12:00:00');
    const fin  = new Date(sv.fin   + 'T12:00:00');
    while (fecha <= fin) {
      const iso = fecha.toISOString().slice(0,10);
      const evts = eventos[iso] || [];
      diasHtml += `<div class="cal-dia">
        <div>
          <div class="cal-dia-num">${fecha.getDate()}</div>
          <div class="cal-dia-dow">${DIAS[fecha.getDay()]}</div>
        </div>
        <div class="cal-dia-eventos">
          ${evts.length ? evts.map(e => `<div class="evento ${e.clase}">${e.label}</div>`).join('') : '<span style="font-size:11px;color:var(--light)">Sin eventos</span>'}
        </div>
      </div>`;
      fecha.setDate(fecha.getDate() + 1);
    }

    div.innerHTML = `
      <div class="cal-semana-head" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.cal-semana-tog').classList.toggle('open')">
        <div>
          <span class="cal-semana-label">${sv.label}</span>
          ${esActiva ? '<span class="badge badge-teal" style="margin-left:8px">Semana actual</span>' : ''}

        <span class="cal-semana-fechas">${PDC.formatFechaCorta(sv.inicio)} — ${PDC.formatFechaCorta(sv.fin)}</span>

      </div>
      <div class="cal-dias ${esActiva ? 'open' : ''}">${diasHtml}</div>
    `;
    calEl.appendChild(div);
  });
}

function renderFVAGM(el, marcaId, marca) {
  const fvaData = PDC.getFVA(marcaId);
  const datosCiclos = fvaData.filter(d => d.valor !== null);
  const promedio = datosCiclos.length
    ? (datosCiclos.reduce((s,d) => s + d.valor, 0) / datosCiclos.length).toFixed(1)
    : null;

  let html = `
    <div class="card">
      <div class="card-head">
        <span class="card-title">📊 Mi Forecast Value Added — ${marca?.nombre || ''}</span>
      </div>
      <div class="card-body">
        <div class="alert alert-info" style="margin-bottom:14px">
          <span>ℹ️</span>
          <span>El FVA mide si tus ajustes del V2 mejoran o empeoran la precisión vs. el estadístico V1 puro. <strong>Positivo = mejor que el modelo estadístico.</strong> Se calcula desde el ciclo 3.</span>
        </div>

        <div class="grid-3" style="margin-bottom:16px">
          <div class="kpi-card">
            <div class="kpi-label">Promedio FVA</div>
            <div class="kpi-value" style="color:${parseFloat(promedio) >= 0 ? 'var(--green)' : 'var(--red)'}">
              ${promedio !== null ? (parseFloat(promedio) >= 0 ? '+' : '') + promedio + '%' : '—'}
            </div>
            <div class="kpi-sub">Últimos ${datosCiclos.length} ciclos</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Mejor ciclo</div>
            <div class="kpi-value" style="color:var(--green)">
              ${datosCiclos.length ? '+' + Math.max(...datosCiclos.map(d=>d.valor)).toFixed(1) + '%' : '—'}
            </div>
            <div class="kpi-sub">${datosCiclos.length ? datosCiclos.find(d=>d.valor===Math.max(...datosCiclos.map(x=>x.valor)))?.ciclo : ''}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Ciclos evaluados</div>
            <div class="kpi-value">${datosCiclos.length}</div>
            <div class="kpi-sub">de ${fvaData.length} totales</div>
          </div>
        </div>

        <div>${fvaData.map(c => {
          if (c.valor === null) return `
            <div class="ciclo-row">
              <div class="ciclo-mes" style="min-width:90px">${c.ciclo}</div>
              <div style="flex:1;font-size:11px;color:var(--mid)">Ciclo activo — FVA se calculará al cierre</div>
              <span class="badge badge-blue">En curso</span>
            </div>`;
          const pos = c.valor >= 0;
          const ancho = Math.min(Math.abs(c.valor) * 4, 100);
          return `
            <div class="ciclo-row">
              <div class="ciclo-mes" style="min-width:90px">${c.ciclo}</div>
              <div class="fva-bar-wrap" style="flex:1">
                <div class="fva-bar-bg"><div class="fva-bar-fill ${pos?'fva-pos':'fva-neg'}" style="width:${ancho}%"></div></div>
                <div style="font-size:13px;font-weight:700;min-width:60px;text-align:right;color:${pos?'var(--green)':'var(--red)'}">
                  ${pos ? '+' : ''}${c.valor.toFixed(1)}%
                </div>
              </div>
              <span class="badge ${pos ? 'badge-green' : 'badge-red'}" style="margin-left:8px">${pos ? 'Positivo' : 'Negativo'}</span>
            </div>`;
        }).join('')}</div>
      </div>
    </div>
  `;
  el.innerHTML = html;
}

function renderFVAPlanner(el) {
  const marcas = PDC.MARCAS;
  const ciclos = ['Mar 2026','Abr 2026','May 2026','Jun 2026'];

  let rows = marcas.map(m => {
    const fva = PDC.getFVA(m.id).filter(d => d.valor !== null);
    const prom = fva.length ? (fva.reduce((s,d) => s+d.valor, 0)/fva.length).toFixed(1) : null;
    const tendencia = fva.length >= 2
      ? (fva[fva.length-1].valor > fva[fva.length-2].valor ? '↑' : '↓')
      : '—';
    return `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:${m.color};flex-shrink:0"></div>
            <span style="font-weight:600">${m.nombre}</span>
          </div>
        </td>
        ${ciclos.map((c,i) => {
          const d = PDC.getFVA(m.id).find(x => x.ciclo === c);
          if (!d || d.valor === null) return '<td class="center"><span class="fva-chip fva-neu-chip">—</span></td>';
          const pos = d.valor >= 0;
          return `<td class="center"><span class="fva-chip ${pos?'fva-pos-chip':'fva-neg-chip'}">${pos?'+':''}${d.valor.toFixed(1)}%</span></td>`;
        }).join('')}
        <td class="center">
          <strong style="color:${prom && parseFloat(prom)>=0?'var(--green)':'var(--red)'}">
            ${prom ? (parseFloat(prom)>=0?'+':'') + prom + '%' : '—'}
          </strong>
        </td>
        <td class="center" style="font-size:16px;color:${tendencia==='↑'?'var(--green)':tendencia==='↓'?'var(--red)':'var(--mid)'}">
          ${tendencia}
        </td>
      </tr>
    `;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-head">
        <span class="card-title">📊 FVA comparativo — todos los gerentes</span>
        <span class="badge badge-mid">Ciclos May–Jul 2026</span>
      </div>
      <div class="alert alert-info" style="margin:12px 16px 0">
        <span>ℹ️</span>
        <span>FVA positivo = el ajuste del Gerente mejoró la precisión vs. el modelo estadístico. FVA negativo = el estadístico era más preciso.</span>
      </div>
      <div style="overflow-x:auto;padding:12px 0">
        <table class="tbl fva-comp-table">
          <thead><tr>
            <th>Gerente / Marca</th>
            ${ciclos.map(c => `<th class="center">${c}</th>`).join('')}
            <th class="center">Promedio</th>
            <th class="center">Tendencia</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

${partsLista}

  · Sin BBs entregados → sesión de emergencia con SKUs críticos únicamente.
  · Ninguna sesión puede extenderse más allá del miércoles de S4 (regla de oro).

Materiales:
  · Baseline estadístico V1 disponible en el Hub de Pronóstico.
  · Building Blocks del Gerente de Marca.

Cualquier cambio de fecha requiere aviso con mínimo 24h de anticipación.

Saludos,
${usuarioActivo.nombre}
Planner de Demanda — Grupo PDC`;

    invWrap.innerHTML = `<div class="invite-box" id="invite-texto">${texto}</div>`;
    copyBtn.style.display = 'block';
  };

  window.copiarInvite = function() {
    const t = document.getElementById('invite-texto')?.innerText;
    if (t) {
      navigator.clipboard.writeText(t).then(() => {
        const btn = document.querySelector('#ag-copy-btn button');
        const orig = btn.textContent;
        btn.textContent = '✅ ¡Copiado!';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    }
  };
}

function renderTabs(tabs, activo) {
  const el = document.getElementById('main-tabs');
  el.innerHTML = tabs.map(t => `
    <button class="pdc-tab ${t.id === activo ? 'active' : ''}" onclick="irATab('${t.id}')">
      ${t.icon} ${t.label}
      ${t.badge ? `<span class="badge">${t.badge}</span>` : ''}
    </button>
  `).join('');
}

function irATab(tabId) {
  // Actualizar tab activo
  document.querySelectorAll('.pdc-tab').forEach(t => {
    t.classList.toggle('active', t.getAttribute('onclick').includes(`'${tabId}'`));
  });
  if (usuarioActivo.rol === 'GM') renderTabGM(tabId);
  else renderTabPlanner(tabId);
}

function editarEstadoGM(marcaId) {
  const estado = PDC.getEstadoGM(marcaId);
  const marca  = PDC.MARCAS.find(m => m.id === marcaId);

  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <span class="modal-title">Actualizar estado — ${marca.nombre}</span>
        <button class="modal-close" onclick="this.closest('.overlay').remove()">×</button>
      </div>
      <div class="modal-body">
        <div class="fld">
          <label>Estado de Building Blocks</label>
          <select id="ed-bb">
            <option value="0" ${!estado.bbEntregado ? 'selected' : ''}>Pendiente</option>
            <option value="1" ${estado.bbEntregado  ? 'selected' : ''}>Entregado</option>
          </select>
        </div>
        <div class="fld">
          <label>Estado del Forecast V2</label>
          <select id="ed-fcst">
            <option value="0" ${!estado.forecastAprobado ? 'selected' : ''}>En espera</option>
            <option value="1" ${estado.forecastAprobado  ? 'selected' : ''}>Aprobado</option>
          </select>
        </div>
        <div class="fld">
          <label>Estado de sesión</label>
          <select id="ed-sesion">
            <option value="pendiente"   ${estado.sesionEstado === 'pendiente'   ? 'selected' : ''}>Pendiente</option>
            <option value="programada"  ${estado.sesionEstado === 'programada'  ? 'selected' : ''}>Programada</option>
            <option value="realizada"   ${estado.sesionEstado === 'realizada'   ? 'selected' : ''}>Realizada</option>
          </select>
        </div>
        <div class="fld">
          <label>Comentario</label>
          <textarea id="ed-comentario" placeholder="Notas sobre el estado...">${estado.comentario || ''}</textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">Cancelar</button>
        <button class="btn btn-teal" onclick="guardarEstadoGM('${marcaId}')">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);
}

function guardarEstadoGM(marcaId) {
  PDC.actualizarEstadoGM(marcaId, {
    bbEntregado:      document.getElementById('ed-bb').value === '1',
    bbFecha:          document.getElementById('ed-bb').value === '1' ? new Date().toISOString().slice(0,10) : null,
    forecastAprobado: document.getElementById('ed-fcst').value === '1',
    forecastFecha:    document.getElementById('ed-fcst').value === '1' ? new Date().toISOString().slice(0,10) : null,
    sesionEstado:     document.getElementById('ed-sesion').value,
    comentario:       document.getElementById('ed-comentario').value,
  });
  document.querySelector('.overlay')?.remove();
  renderTabPlanner('inicio'); // Refrescar
}

function actualizarSemaforo() {
  renderTabPlanner('inicio');
}

          <div style="display:flex;gap:4px;justify-content:center">

/* ── Modal Marca ── */
function abrirModalMarca(marcaId = null) {
  const marcas = getMarcas();
  const m = marcaId ? marcas.find(x => x.id === marcaId) : null;

  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <span class="modal-title">${m ? 'Editar marca' : 'Nueva marca'}</span>
        <button class="modal-close" onclick="this.closest('.overlay').remove()">×</button>
      </div>
      <div class="modal-body">
        ${!m ? `<div class="fld"><label>ID de la marca (corto, sin espacios)</label>
          <input type="text" id="m-id" placeholder="Ej: MB, AU, DC..." maxlength="5" style="text-transform:uppercase">
          <div style="font-size:10px;color:var(--mid);margin-top:2px">Se usa internamente. No se puede cambiar después.</div>
        </div>` : `<div style="font-size:12px;color:var(--mid);margin-bottom:4px">ID: <code style="background:#EEF1F7;padding:1px 6px;border-radius:3px">${m.id}</code></div>`}
        <div class="fld"><label>Nombre de la marca</label>
          <input type="text" id="m-nombre" value="${m?.nombre||''}" placeholder="Ej: Magia Blanca">
        </div>
        <div class="fld"><label>Color</label>
          <div style="display:flex;align-items:center;gap:10px">
            <input type="color" id="m-color" value="${m?.color||'#1A2B4A'}" style="width:48px;height:36px;border:1px solid var(--bdr);border-radius:5px;padding:2px;cursor:pointer">
            <input type="text" id="m-color-hex" value="${m?.color||'#1A2B4A'}" placeholder="#1A2B4A" style="width:100px" oninput="document.getElementById('m-color').value=this.value">
          </div>
        </div>
        <script>document.getElementById('m-color').addEventListener('input',function(){document.getElementById('m-color-hex').value=this.value})<\/script>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">Cancelar</button>
        <button class="btn btn-teal" onclick="guardarMarcaModal('${marcaId||''}')">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);
}

function guardarMarcaModal(marcaId) {
  const nombre = document.getElementById('m-nombre').value.trim();
  const color  = document.getElementById('m-color').value;
  if (!nombre) { alert('Ingresa un nombre.'); return; }

  const marcas = getMarcas();
  if (marcaId) {
    const m = marcas.find(x => x.id === marcaId);
    if (m) { m.nombre = nombre; m.color = color; }
  } else {
    const idEl = document.getElementById('m-id');
    const id = (idEl?.value||'').trim().toUpperCase().replace(/\s/g,'');
    if (!id) { alert('Ingresa un ID.'); return; }
    if (marcas.find(m => m.id === id)) { alert('Ya existe una marca con ese ID.'); return; }
    marcas.push({ id, nombre, color });
  }
  guardarMarcas(marcas);
  document.querySelector('.overlay')?.remove();
  renderTablaMarcas();
  renderTablaUsuarios();
}

function eliminarMarca(marcaId) {
  const usuarios = getUsuarios().filter(u => u.marcaId === marcaId);
  if (usuarios.length) {
    if (!confirm(`Esta marca tiene ${usuarios.length} usuario(s) asignados. ¿Eliminarla de todas formas? Los usuarios quedarán sin marca.`)) return;
    const us = getUsuarios();
    us.forEach(u => { if (u.marcaId === marcaId) u.marcaId = null; });
    guardarUsuarios(us);
  } else {
    if (!confirm('¿Eliminar esta marca?')) return;
  }
  const marcas = getMarcas().filter(m => m.id !== marcaId);
  guardarMarcas(marcas);
  renderTablaMarcas();
  renderTablaUsuarios();
}

/* ── Modal Usuario ── */
function abrirModalUsuario(usuarioId = null) {
  const usuarios = getUsuarios();
  const marcas   = getMarcas();
  const u = usuarioId ? usuarios.find(x => x.id === usuarioId) : null;

  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <span class="modal-title">${u ? 'Editar usuario' : 'Nuevo usuario'}</span>
        <button class="modal-close" onclick="this.closest('.overlay').remove()">×</button>
      </div>
      <div class="modal-body">
        <div class="fld"><label>Nombre completo</label>
          <input type="text" id="u-nombre" value="${u?.nombre||''}" placeholder="Ej: Ana García">
        </div>
        <div class="fld"><label>Rol</label>
          <select id="u-rol" onchange="toggleMarcaField()">
            <option value="GM" ${u?.rol==='GM'?'selected':''}>Gerente de Marca</option>
            <option value="PLANNER" ${u?.rol==='PLANNER'?'selected':''}>Planner de Demanda</option>
          </select>
        </div>
        <div class="fld" id="campo-marca" style="${u?.rol==='PLANNER'?'display:none':''}">
          <label>Marca asignada</label>
          <select id="u-marca">
            <option value="">— Sin marca —</option>
            ${marcas.map(m => `<option value="${m.id}" ${u?.marcaId===m.id?'selected':''}>${m.nombre}</option>`).join('')}
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="fld"><label>Iniciales (2 letras)</label>
            <input type="text" id="u-iniciales" value="${u?.iniciales||''}" placeholder="Ej: AG" maxlength="2" style="text-transform:uppercase">
          </div>
          <div class="fld"><label>Color del avatar</label>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="color" id="u-color" value="${u?.color||'#2E5FA3'}" style="width:40px;height:34px;border:1px solid var(--bdr);border-radius:5px;padding:2px;cursor:pointer">
              <span id="u-color-preview" style="width:30px;height:30px;border-radius:50%;background:${u?.color||'#2E5FA3'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">${u?.iniciales||'AB'}</span>
            </div>
          </div>
        </div>
        <script>
          document.getElementById('u-color').addEventListener('input',function(){document.getElementById('u-color-preview').style.background=this.value});
          document.getElementById('u-iniciales').addEventListener('input',function(){document.getElementById('u-color-preview').textContent=this.value.toUpperCase()});
          function toggleMarcaField(){const r=document.getElementById('u-rol').value;document.getElementById('campo-marca').style.display=r==='PLANNER'?'none':'';}
        <\/script>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">Cancelar</button>
        <button class="btn btn-teal" onclick="guardarUsuarioModal('${usuarioId||''}')">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);
}

function guardarUsuarioModal(usuarioId) {
  const nombre    = document.getElementById('u-nombre').value.trim();
  const rol       = document.getElementById('u-rol').value;
  const marcaId   = rol === 'PLANNER' ? null : (document.getElementById('u-marca').value || null);
  const iniciales = (document.getElementById('u-iniciales').value||'').toUpperCase().slice(0,2);
  const color     = document.getElementById('u-color').value;

  if (!nombre)    { alert('Ingresa el nombre.'); return; }
  if (!iniciales) { alert('Ingresa las iniciales.'); return; }

  const usuarios = getUsuarios();
  if (usuarioId) {
    const u = usuarios.find(x => x.id === usuarioId);
    if (u) Object.assign(u, { nombre, rol, marcaId, iniciales, color });
  } else {
    const id = nombre.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z_]/g,'') + '_' + Date.now().toString().slice(-4);
    usuarios.push({ id, nombre, rol, marcaId, iniciales, color });
  }
  guardarUsuarios(usuarios);

  // Sincronizar con Auth para que el selector use los usuarios actualizados
  Auth.USUARIOS = usuarios;

  document.querySelector('.overlay')?.remove();
  renderTablaUsuarios();
}

function eliminarUsuario(usuarioId) {
  if (usuarioId === usuarioActivo?.id) { alert('No puedes eliminarte a ti mismo.'); return; }
  if (!confirm('¿Eliminar este usuario?')) return;
  const lista = getUsuarios().filter(u => u.id !== usuarioId);
  guardarUsuarios(lista);
  Auth.USUARIOS = lista;
  renderTablaUsuarios();
}
</script>
